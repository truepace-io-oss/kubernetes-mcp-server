apiVersion: v2
name: kubernetes-mcp
description: |
  MCP (Model Context Protocol) server that manages one or more Kubernetes
  clusters using ServiceAccount tokens. Authorization is delegated entirely to
  Kubernetes RBAC. Remote-cluster credentials are configurable via the External
  Secrets Operator (ESO).
type: application
version: 0.3.4
appVersion: "0.3.1"
keywords:
  - mcp
  - kubernetes
  - ai
  - rbac
home: https://github.com/truepace-io-oss/kubernetes-mcp-server
sources:
  - https://github.com/truepace-io-oss/kubernetes-mcp-server
maintainers:
  - name: truepace-io-oss
