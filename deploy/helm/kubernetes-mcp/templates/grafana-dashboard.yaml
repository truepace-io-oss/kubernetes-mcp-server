{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubernetes-mcp.fullname" . }}-dashboard
  {{- with .Values.grafanaDashboard.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "kubernetes-mcp.labels" . | nindent 4 }}
    {{ .Values.grafanaDashboard.label }}: {{ .Values.grafanaDashboard.labelValue | quote }}
    {{- with .Values.grafanaDashboard.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.grafanaDashboard.folder }}
  annotations:
    {{ $.Values.grafanaDashboard.folderAnnotation }}: {{ . | quote }}
  {{- end }}
data:
  kubernetes-mcp.json: |-
{{ .Files.Get "dashboards/kubernetes-mcp.json" | indent 4 }}
{{- end }}
