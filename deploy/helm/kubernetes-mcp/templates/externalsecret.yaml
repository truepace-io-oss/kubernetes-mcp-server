{{- $root := . }}
{{- $eso := .Values.externalSecrets }}
{{- /* Per-remote-cluster credentials (token + ca.crt). */ -}}
{{- range .Values.remoteClusters }}
{{- if and $eso.enabled .eso }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "kubernetes-mcp.remoteSecretName" (dict "root" $root "cluster" .) }}
  labels:
    {{- include "kubernetes-mcp.labels" $root | nindent 4 }}
spec:
  refreshInterval: {{ $eso.refreshInterval }}
  secretStoreRef:
    kind: {{ $eso.secretStore.kind }}
    name: {{ $eso.secretStore.name }}
  target:
    name: {{ include "kubernetes-mcp.remoteSecretName" (dict "root" $root "cluster" .) }}
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: {{ .eso.tokenRef | quote }}
    - secretKey: ca.crt
      remoteRef:
        key: {{ .eso.caRef | quote }}
{{- end }}
{{- end }}
{{- /* Static agent-auth bearer tokens via ESO (one Secret per token, key `token`). */ -}}
{{- if and .Values.auth.enabled .Values.auth.static.enabled }}
{{- range .Values.auth.static.tokens }}
{{- if and $eso.enabled .eso }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "kubernetes-mcp.fullname" $root }}-auth-{{ .name }}
  labels:
    {{- include "kubernetes-mcp.labels" $root | nindent 4 }}
spec:
  refreshInterval: {{ $eso.refreshInterval }}
  secretStoreRef:
    kind: {{ $eso.secretStore.kind }}
    name: {{ $eso.secretStore.name }}
  target:
    name: {{ include "kubernetes-mcp.fullname" $root }}-auth-{{ .name }}
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: {{ .eso.ref | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- /* Image pull secret (dockerconfigjson) via ESO. */ -}}
{{- if and $eso.enabled .Values.imagePullSecret.esoRef }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "kubernetes-mcp.fullname" . }}-pull
  labels:
    {{- include "kubernetes-mcp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $eso.refreshInterval }}
  secretStoreRef:
    kind: {{ $eso.secretStore.kind }}
    name: {{ $eso.secretStore.name }}
  target:
    name: {{ include "kubernetes-mcp.fullname" . }}-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: {{ .Values.imagePullSecret.esoRef | quote }}
{{- end }}
{{- /* Optional ingress basic-auth htpasswd via ESO. */ -}}
{{- if and $eso.enabled .Values.ingress.enabled .Values.ingress.basicAuth.enabled .Values.ingress.basicAuth.esoRef }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "kubernetes-mcp.fullname" . }}-basic-auth
  labels:
    {{- include "kubernetes-mcp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $eso.refreshInterval }}
  secretStoreRef:
    kind: {{ $eso.secretStore.kind }}
    name: {{ $eso.secretStore.name }}
  target:
    name: {{ include "kubernetes-mcp.fullname" . }}-basic-auth
    creationPolicy: Owner
  data:
    - secretKey: auth
      remoteRef:
        key: {{ .Values.ingress.basicAuth.esoRef | quote }}
{{- end }}
