# kubernetes-mcp server configuration.
#
# Authentication to every cluster is a Kubernetes ServiceAccount credential.
# The server has NO auth logic of its own — Kubernetes RBAC is the only gate.

listenAddr: "0.0.0.0:9090"   # KMCP_LISTEN_ADDR
metricsAddr: ":9091"         # Prometheus /metrics on a separate port; "off" to disable ; KMCP_METRICS_ADDR
logLevel: "info"             # debug|info|warn|error ; KMCP_LOG_LEVEL
readOnly: false              # global kill-switch for all mutating tools ; KMCP_READ_ONLY
defaultCluster: "local"      # used when a tool call omits `cluster` ; KMCP_DEFAULT_CLUSTER

clusters:
  # (a) The cluster this pod runs in — uses the projected SA token automatically.
  - name: local
    inCluster: true
    readOnly: false
    defaultNamespace: ""     # "" means "all namespaces" for list operations

  # (b) A remote cluster reached with an explicit SA token + CA.
  #     Prefer *File forms: they are re-read on rotation (projected / ESO tokens).
  - name: customer-a
    server: "https://api.customer-a.example.com:6443"
    certificateAuthorityFile: "/etc/kmcp/clusters/customer-a/ca.crt"
    tokenFile: "/etc/kmcp/clusters/customer-a/token"
    readOnly: true
    defaultNamespace: ""
    insecureSkipTLSVerify: false   # keep false in production

  # (c) A cluster selected from a mounted kubeconfig context.
  - name: homelab
    kubeconfigFile: "/etc/kmcp/kubeconfig"
    context: "homelab"
    readOnly: false

# Authentication of the AI agent to THIS MCP server (the client-side link).
# Independent of cluster auth. Disabled by default (protect via internal ingress).
# When enabled, always run behind TLS — bearer tokens over plaintext are insecure.
auth:
  enabled: false            # KMCP_AUTH_ENABLED

  # (1) Shared bearer tokens. A request is accepted if it presents any of them.
  static:
    enabled: false
    tokens:
      - name: ci
        tokenFile: /etc/kmcp/auth/ci-token   # preferred (ESO, rotatable)
      - name: laptop
        token: "change-me"                   # inline, discouraged

  # (2) OIDC / OAuth 2.1 resource server (Authentik or Keycloak).
  oidc:
    enabled: false
    # Authentik: https://authentik.example.com/application/o/<app-slug>/
    # Keycloak:  https://kc.example.com/realms/<realm>
    issuer: ""
    audience: ""            # RFC 8707 resource id == this MCP's public URL == token `aud`
    jwksUrl: ""            # optional; default discovered from the issuer
    requiredScopes: []      # e.g. ["mcp.access"]
    requiredGroups: []      # e.g. ["k8s-admins"]
    groupsClaim: "groups"
    usernameClaim: "preferred_username"
    resourceMetadata: true  # serve /.well-known/oauth-protected-resource for client discovery
